version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: datashare-postgres
    restart: always
    environment:
      POSTGRES_USER: datashare_user
      POSTGRES_PASSWORD: datashare_password
      POSTGRES_DB: datashare_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
